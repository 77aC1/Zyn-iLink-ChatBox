<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>扫码连接 · 微信Bot</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ============================================
   CSS Variables & Reset
   ============================================ */
:root {
  --green: #07c160;
  --green-dim: #059a4c;
  --green-glow: rgba(7, 193, 96, 0.3);
  --green-subtle: rgba(7, 193, 96, 0.08);
  --bg-deep: #08080e;
  --bg-card: rgba(18, 22, 28, 0.72);
  --bg-card-border: rgba(255, 255, 255, 0.06);
  --text-primary: rgba(255, 255, 255, 0.92);
  --text-secondary: rgba(255, 255, 255, 0.55);
  --text-tertiary: rgba(255, 255, 255, 0.32);
  --radius-sm: 8px;
  --radius-md: 16px;
  --radius-lg: 28px;
  --radius-xl: 36px;
  --font-sans: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  --font-mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
  --shadow-card: 0 25px 60px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.04);
  --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
  --ease-inout: cubic-bezier(0.65, 0, 0.35, 1);
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  height: 100%;
  font-family: var(--font-sans);
  background: var(--bg-deep);
  color: var(--text-primary);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  overflow: hidden;
  -webkit-user-select: none;
  user-select: none;
  -webkit-touch-callout: none;
}

/* ============================================
   Animated Background
   ============================================ */
.bg {
  position: fixed;
  inset: 0;
  z-index: 0;
  overflow: hidden;
  background: linear-gradient(145deg, #08080e 0%, #0a1410 40%, #0c1a14 70%, #08080e 100%);
}

.bg::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 20% 80%, rgba(7, 193, 96, 0.06) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 80% 20%, rgba(7, 193, 96, 0.04) 0%, transparent 50%),
    radial-gradient(ellipse 40% 40% at 50% 50%, rgba(7, 193, 96, 0.03) 0%, transparent 40%);
  animation: bgShift 20s var(--ease-inout) infinite alternate;
}

@keyframes bgShift {
  0%   { transform: scale(1) rotate(0deg); opacity: 0.8; }
  50%  { transform: scale(1.1) rotate(2deg); opacity: 1; }
  100% { transform: scale(0.95) rotate(-1deg); opacity: 0.7; }
}

/* Floating Orbs */
.orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(80px);
  will-change: transform;
  pointer-events: none;
}
.orb-1 {
  width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(7, 193, 96, 0.08) 0%, transparent 70%);
  top: -15%; left: -10%;
  animation: orbFloat1 25s var(--ease-inout) infinite alternate;
}
.orb-2 {
  width: 400px; height: 400px;
  background: radial-gradient(circle, rgba(7, 193, 96, 0.05) 0%, transparent 60%);
  bottom: -20%; right: -15%;
  animation: orbFloat2 30s var(--ease-inout) infinite alternate;
}
.orb-3 {
  width: 300px; height: 300px;
  background: radial-gradient(circle, rgba(0, 200, 255, 0.04) 0%, transparent 50%);
  top: 40%; left: 60%;
  animation: orbFloat3 20s var(--ease-inout) infinite alternate;
}

@keyframes orbFloat1 {
  0%   { transform: translate(0, 0) scale(1); }
  100% { transform: translate(80px, 60px) scale(1.15); }
}
@keyframes orbFloat2 {
  0%   { transform: translate(0, 0) scale(1); }
  100% { transform: translate(-60px, -40px) scale(1.2); }
}
@keyframes orbFloat3 {
  0%   { transform: translate(0, 0) scale(1); }
  100% { transform: translate(40px, -80px) scale(1.1); }
}

/* Grain Overlay */
.bg::after {
  content: '';
  position: absolute;
  inset: 0;
  opacity: 0.035;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-repeat: repeat;
  background-size: 256px 256px;
  pointer-events: none;
}

/* ============================================
   Main Container
   ============================================ */
.container {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100%;
  padding: 20px;
}

/* ============================================
   Glass Card
   ============================================ */
.card {
  position: relative;
  width: 100%;
  max-width: 420px;
  background: var(--bg-card);
  backdrop-filter: blur(40px) saturate(1.4);
  -webkit-backdrop-filter: blur(40px) saturate(1.4);
  border: 1px solid var(--bg-card-border);
  border-radius: var(--radius-xl);
  box-shadow: var(--shadow-card);
  padding: 44px 36px 40px;
  text-align: center;
  animation: cardIn 0.8s var(--ease-out) both;
  -webkit-user-select: none;
  user-select: none;
}

@keyframes cardIn {
  from { opacity: 0; transform: translateY(30px) scale(0.97); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

/* ============================================
   Header
   ============================================ */
.header-icon {
  width: 56px;
  height: 56px;
  margin: 0 auto 16px;
  background: linear-gradient(135deg, var(--green-subtle), rgba(7, 193, 96, 0.03));
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1px solid rgba(7, 193, 96, 0.15);
  animation: iconPulse 3s var(--ease-inout) infinite;
}

@keyframes iconPulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(7, 193, 96, 0.1); }
  50%      { box-shadow: 0 0 0 12px rgba(7, 193, 96, 0); }
}

.header-icon svg {
  width: 28px;
  height: 28px;
  fill: none;
  stroke: var(--green);
  stroke-width: 1.8;
  stroke-linecap: round;
  stroke-linejoin: round;
  pointer-events: none;
}

.card h1 {
  font-size: 22px;
  font-weight: 600;
  letter-spacing: 0.01em;
  margin-bottom: 6px;
  color: var(--text-primary);
}

.card .subtitle {
  font-size: 14px;
  font-weight: 400;
  color: var(--text-secondary);
  margin-bottom: 32px;
  letter-spacing: 0.02em;
}

/* ============================================
   QR Code Area
   ============================================ */
.qr-wrapper {
  position: relative;
  width: 280px;
  height: 280px;
  margin: 0 auto 28px;
}

.qr-container {
  position: absolute;
  inset: 4px;
  border-radius: var(--radius-md);
  background: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  transition: box-shadow 0.5s var(--ease-out);
}

.qr-container canvas {
  display: block;
  width: 100%;
  height: 100%;
  border-radius: 10px;
  -webkit-user-select: none;
  user-select: none;
  -webkit-touch-callout: none;
  pointer-events: none;
}

/* QR Breathing glow when waiting */
.qr-container.glow-active {
  box-shadow: inset 0 0 0 1px rgba(7, 193, 96, 0.1), 0 0 30px rgba(7, 193, 96, 0.06);
  animation: qrGlow 2.5s var(--ease-inout) infinite;
}

@keyframes qrGlow {
  0%, 100% { box-shadow: inset 0 0 0 1px rgba(7, 193, 96, 0.06), 0 0 20px rgba(7, 193, 96, 0.02); }
  50%      { box-shadow: inset 0 0 0 1px rgba(7, 193, 96, 0.15), 0 0 40px rgba(7, 193, 96, 0.08); }
}

.qr-container.loading {
  background: rgba(255, 255, 255, 0.04);
  box-shadow: none;
  animation: none;
}

/* ============================================
   Status
   ============================================ */
.status {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  font-size: 15px;
  font-weight: 450;
  color: var(--text-secondary);
  min-height: 48px;
  padding: 8px 16px;
  border-radius: var(--radius-sm);
  transition: all 0.5s var(--ease-out);
  margin-bottom: 24px;
}

.status-icon {
  flex-shrink: 0;
  width: 22px;
  height: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.status-icon svg {
  width: 20px;
  height: 20px;
  fill: none;
  stroke: currentColor;
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
  pointer-events: none;
}

/* Status variants */
.status.idle     { color: var(--text-secondary); }
.status.waiting  { color: var(--green); }
.status.scaned   { color: #f0a500; }
.status.done     { color: var(--green); background: var(--green-subtle); border: 1px solid rgba(7, 193, 96, 0.12); }
.status.expired  { color: #ff6b6b; }
.status.error    { color: #ff6b6b; }

/* ============================================
   Buttons
   ============================================ */
.btn-group {
  display: flex;
  gap: 12px;
  justify-content: center;
  flex-wrap: wrap;
}

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 12px 32px;
  border: none;
  border-radius: 50px;
  font-family: var(--font-sans);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.35s var(--ease-out);
  -webkit-tap-highlight-color: transparent;
  -webkit-user-select: none;
  user-select: none;
  -webkit-touch-callout: none;
  position: relative;
  overflow: hidden;
}

.btn-primary {
  background: var(--green);
  color: #fff;
  box-shadow: 0 4px 20px rgba(7, 193, 96, 0.25);
}

.btn-primary:hover {
  background: #06b858;
  transform: translateY(-1px);
  box-shadow: 0 6px 28px rgba(7, 193, 96, 0.35);
}

.btn-primary:active {
  transform: translateY(0) scale(0.98);
  box-shadow: 0 2px 12px rgba(7, 193, 96, 0.2);
}

.btn-primary:disabled {
  opacity: 0.4;
  cursor: not-allowed;
  transform: none;
  box-shadow: none;
}

.btn-ghost {
  background: rgba(255, 255, 255, 0.06);
  color: var(--text-secondary);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255, 255, 255, 0.06);
}

.btn-ghost:hover {
  background: rgba(255, 255, 255, 0.1);
  color: var(--text-primary);
}

.btn-ghost:active {
  transform: scale(0.97);
}

.btn svg {
  width: 16px;
  height: 16px;
  fill: none;
  stroke: currentColor;
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
  pointer-events: none;
}

/* ============================================
   Footer
   ============================================ */
.footer {
  margin-top: 28px;
  font-size: 12px;
  color: var(--text-tertiary);
  letter-spacing: 0.03em;
}

/* ============================================
   Success Celebration
   ============================================ */
.confetti {
  position: absolute;
  width: 6px;
  height: 6px;
  border-radius: 2px;
  pointer-events: none;
  animation: confettiFall 3s var(--ease-out) forwards;
}

@keyframes confettiFall {
  0%   { transform: translateY(-20px) rotate(0deg) scale(0); opacity: 0; }
  10%  { opacity: 1; transform: translateY(0) rotate(0deg) scale(1); }
  100% { transform: translateY(260px) rotate(720deg) scale(0.5); opacity: 0; }
}

/* ============================================
   Responsive
   ============================================ */
@media (max-width: 480px) {
  .card {
    padding: 32px 20px 28px;
    border-radius: var(--radius-lg);
  }
  .qr-wrapper {
    width: 220px;
    height: 220px;
  }
  .card h1 { font-size: 20px; }
  .btn { padding: 10px 24px; font-size: 13px; }
}

@media (max-height: 700px) {
  .card { padding: 24px 20px 20px; }
  .header-icon { width: 44px; height: 44px; margin-bottom: 10px; }
  .header-icon svg { width: 22px; height: 22px; }
  .card h1 { font-size: 18px; }
  .card .subtitle { font-size: 13px; margin-bottom: 20px; }
  .qr-wrapper { width: 190px; height: 190px; }
  .status { min-height: 36px; font-size: 13px; margin-bottom: 16px; }
  .footer { margin-top: 16px; }
}
</style>
</head>
<body>

<div class="bg">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>

<div class="container">
  <div class="card" id="card">

    <div class="header-icon">
      <svg viewBox="0 0 24 24">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        <line x1="12" y1="8" x2="12" y2="12"/>
        <line x1="9" y1="11" x2="15" y2="11"/>
      </svg>
    </div>

    <h1>连接微信 Bot</h1>
    <p class="subtitle">打开微信扫一扫，扫码即连</p>

    <div class="qr-wrapper" id="qrWrapper">
      <div class="qr-container loading" id="qrContainer">
        <canvas id="qrCanvas" width="400" height="400"></canvas>
      </div>
    </div>

    <div class="status idle" id="status">
      <span class="status-icon" id="statusIcon">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
      </span>
      <span id="statusText">正在初始化…</span>
    </div>

    <div class="btn-group">
      <button class="btn btn-primary" onclick="openWechat()" id="wechatBtn">
        <svg viewBox="0 0 24 24"><path d="M8.5 11a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3zm5 0a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3z"/><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7A8.38 8.38 0 0 1 3 18.4 8.5 8.5 0 0 1 9.07 7a8.5 8.5 0 0 1 11.93 4.5z"/></svg>
        打开微信
      </button>
      <button class="btn btn-ghost" onclick="saveQR()" id="saveBtn">
        <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        保存图片
      </button>
      <button class="btn btn-ghost" onclick="startQR()" id="refreshBtn">
        <svg viewBox="0 0 24 24"><path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
        刷新
      </button>
    </div>

    <div class="footer">
      二维码每 2 分钟自动刷新
    </div>
  </div>
</div>

<script>
const CONFIG = {
  apiBase: window.location.origin,
  pollInterval: 1500,
};

let state = {
  pollTimer: null,
  currentStatus: 'idle',
  isRunning: false,
  hadQR: false,
};

const $ = (id) => document.getElementById(id);
const el = {
  card: $('card'),
  qrWrapper: $('qrWrapper'),
  qrContainer: $('qrContainer'),
  qrCanvas: $('qrCanvas'),
  status: $('status'),
  statusIcon: $('statusIcon'),
  statusText: $('statusText'),
  refreshBtn: $('refreshBtn'),
  saveBtn: $('saveBtn'),
  wechatBtn: $('wechatBtn'),
};

function renderQR(matrix) {
  if (!matrix || !matrix.length) return;

  const canvas = el.qrCanvas;
  const ctx = canvas.getContext('2d');
  const rows = matrix.length;
  const cols = matrix[0].length;
  const canvasSize = canvas.width;
  const padding = Math.max(8, Math.floor(canvasSize * 0.055));
  const cellW = (canvasSize - padding * 2) / cols;
  const cellH = (canvasSize - padding * 2) / rows;
  const cellSize = Math.min(cellW, cellH);
  const offsetX = (canvasSize - cols * cellSize) / 2;
  const offsetY = (canvasSize - rows * cellSize) / 2;

  ctx.clearRect(0, 0, canvasSize, canvasSize);
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, canvasSize, canvasSize);

  ctx.fillStyle = '#000000';
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      if (matrix[r][c] === '█') {
        const x = offsetX + c * cellSize;
        const y = offsetY + r * cellSize;
        const rad = Math.max(0.5, cellSize * 0.12);
        ctx.beginPath();
        ctx.roundRect(x, y, cellSize, cellSize, rad);
        ctx.fill();
      }
    }
  }

  if (rows > 20) {
    ctx.fillStyle = 'rgba(7, 193, 96, 0.03)';
    const finderSize = 7 * cellSize;
    ctx.fillRect(offsetX, offsetY, finderSize, finderSize);
    ctx.fillRect(offsetX + (cols - 7) * cellSize, offsetY, finderSize, finderSize);
    ctx.fillRect(offsetX, offsetY + (rows - 7) * cellSize, finderSize, finderSize);
  }
}

if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
    r = Math.min(r, w / 2, h / 2);
    this.moveTo(x + r, y);
    this.lineTo(x + w - r, y);
    this.quadraticCurveTo(x + w, y, x + w, y + r);
    this.lineTo(x + w, y + h - r);
    this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    this.lineTo(x + r, y + h);
    this.quadraticCurveTo(x, y + h, x, y + h - r);
    this.lineTo(x, y + r);
    this.quadraticCurveTo(x, y, x + r, y);
    this.closePath();
    return this;
  };
}

function setStatus(type, text, iconHTML) {
  el.status.className = 'status ' + type;
  el.statusText.textContent = text;
  if (iconHTML) el.statusIcon.innerHTML = iconHTML;
  state.currentStatus = type;
}

function setQRLoading(loading) {
  el.qrContainer.classList.toggle('loading', loading);
  if (loading) {
    el.qrContainer.classList.remove('glow-active');
    el.qrCanvas.style.display = 'none';
  } else {
    el.qrCanvas.style.display = 'block';
  }
}

function setQRGlow(active) {
  el.qrContainer.classList.toggle('glow-active', active);
  el.qrContainer.classList.remove('loading');
  el.qrCanvas.style.display = 'block';
}

// ============================================
// Save QR as image
// ============================================
function saveQR() {
  const canvas = el.qrCanvas;
  if (canvas.style.display === 'none' || el.qrContainer.classList.contains('loading')) {
    setStatus('error', '二维码尚未生成', ICONS.error);
    return;
  }
  try {
    const link = document.createElement('a');
    link.download = 'wechat-bot-qrcode.png';
    link.href = canvas.toDataURL('image/png');
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    setStatus('waiting', '📷 图片已保存，发给好友扫码吧', ICONS.scan);
  } catch(e) {
    setStatus('error', '保存失败', ICONS.error);
  }
}

// ============================================
// Open WeChat
// ============================================
function openWechat() {
  const ua = navigator.userAgent.toLowerCase();
  const isIOS = /iphone|ipad|ipod/.test(ua);
  const isAndroid = /android/.test(ua);

  if (isIOS || isAndroid) {
    const el2 = document.createElement('iframe');
    el2.style.display = 'none';
    el2.src = 'weixin://';
    document.body.appendChild(el2);

    setTimeout(() => {
      document.body.removeChild(el2);
    }, 2000);

    setTimeout(() => {
      setStatus('scaned', '如果微信未自动打开，请手动打开微信扫码', ICONS.scan);
    }, 800);
  } else {
    setStatus('waiting', '📷 请用手机微信扫描二维码', ICONS.scan);
  }
}

// ============================================
// Core: Start QR Generation
// ============================================
async function startQR() {
  if (state.isRunning) return;
  state.isRunning = true;
  state.hadQR = false;

  stopPolling();
  setQRLoading(true);
  el.refreshBtn.disabled = true;

  setStatus('idle', '正在获取二维码…', ICONS.info);

  try {
    const resp = await fetch(`${CONFIG.apiBase}/api/wasm/add-user-start`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({})
    });
    const data = await resp.json();

    if (!resp.ok) {
      throw new Error(data.error || '请求失败');
    }

    if (data.success) {
      startPolling();
    } else {
      throw new Error(data.error || '启动失败');
    }
  } catch (e) {
    setStatus('error', '⚠️ ' + e.message, ICONS.error);
    setQRLoading(false);
    el.refreshBtn.disabled = false;
    state.isRunning = false;
  }
}

function startPolling() {
  stopPolling();
  state.pollTimer = setInterval(pollStatus, CONFIG.pollInterval);
}

function stopPolling() {
  if (state.pollTimer) { clearInterval(state.pollTimer); state.pollTimer = null; }
}

async function pollStatus() {
  try {
    const resp = await fetch(`${CONFIG.apiBase}/api/wasm/add-user-status`, {
      credentials: 'include'
    });
    if (!resp.ok) {
      if (resp.status === 401) {
        stopPolling();
        setStatus('error', '会话已过期，请刷新页面', ICONS.error);
        el.refreshBtn.disabled = false;
        state.isRunning = false;
      }
      return;
    }
    const data = await resp.json();

    if (data.matrix && data.matrix.length > 0) {
      if (!state.hadQR) {
        state.hadQR = true;
        setQRLoading(false);
        setQRGlow(true);
      }
      renderQR(data.matrix);
    }

    const st = data.qrcode_status;
    switch (st) {
      case 'waiting':
        setStatus('waiting', '📷 请使用微信扫描二维码', ICONS.scan);
        break;
      case 'scaned':
        setStatus('scaned', '✅ 已扫码，请在手机上确认…', ICONS.scaned);
        setQRGlow(false);
        break;
      case 'done':
        setStatus('done', '🎉 连接成功！', ICONS.success);
        stopPolling();
        setQRGlow(false);
        el.refreshBtn.disabled = false;
        state.isRunning = false;
        launchCelebration();
        break;
      case 'expired':
      case 'timeout':
        setStatus('expired', '⏰ 二维码已过期，自动刷新…', ICONS.expired);
        setQRGlow(false);
        setQRLoading(true);
        stopPolling();
        state.isRunning = false;
        state.hadQR = false;
        setTimeout(() => startQR(), 1200);
        break;
      case 'error':
        setStatus('error', '⚠️ ' + (data.message || '获取失败'), ICONS.error);
        stopPolling();
        setQRGlow(false);
        setQRLoading(true);
        el.refreshBtn.disabled = false;
        state.isRunning = false;
        break;
      default:
        if (st && st !== 'none' && st !== 'generating') {
          setStatus('waiting', '等待扫码…', ICONS.scan);
        }
    }
  } catch (e) {
    console.log('Poll error:', e);
  }
}

function launchCelebration() {
  const wrapper = el.qrWrapper;
  const colors = ['#07c160', '#f0a500', '#ff6b6b', '#4fc3f7', '#ce93d8', '#fff176'];
  for (let i = 0; i < 30; i++) {
    const el2 = document.createElement('div');
    el2.className = 'confetti';
    el2.style.left = (Math.random() * 100) + '%';
    el2.style.top = '-10px';
    el2.style.background = colors[i % colors.length];
    el2.style.animationDelay = (Math.random() * 0.8) + 's';
    el2.style.animationDuration = (2 + Math.random() * 2) + 's';
    el2.style.width = (4 + Math.random() * 4) + 'px';
    el2.style.height = (4 + Math.random() * 4) + 'px';
    wrapper.appendChild(el2);
    setTimeout(() => el2.remove(), 4000);
  }
}
